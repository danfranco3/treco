services:
  - type: web
    name: treco-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: treco-db
          property: connectionString
      - key: DATABASE_MODE
        value: postgres
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: anthropic

  - type: web
    name: treco-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: treco-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_WORKSPACE_ID
        value: default

databases:
  - name: treco-db
    databaseName: treco
    user: treco
    plan: free
